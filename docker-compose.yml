services:
  # --- THE SHARED BRAIN ---
  redis:
    image: redis:alpine
    container_name: redis_store
    ports:
      - "6379:6379"
    networks:
      - app_network

  # --- THE LOAD BALANCER ---
  nginx:
    image: nginx:alpine
    container_name: load_balancer
    ports:
      - "80:80" # We hit localhost:80, it forwards to the APIs
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api-1
      - api-2
      - api-3
    networks:
      - app_network

  # --- API INSTANCE 1 ---
  api-1:
    build: .
    container_name: api-1
    environment:
      - PORT=3000
      - INSTANCE_ID=Server_1 # To identify who is answering
      - REDIS_HOST=redis
    depends_on:
      - redis
    networks:
      - app_network

  # --- API INSTANCE 2 ---
  api-2:
    build: .
    container_name: api-2
    environment:
      - PORT=3000
      - INSTANCE_ID=Server_2
      - REDIS_HOST=redis
    depends_on:
      - redis
    networks:
      - app_network

  # --- API INSTANCE 3 ---
  api-3:
    build: .
    container_name: api-3
    environment:
      - PORT=3000
      - INSTANCE_ID=Server_3
      - REDIS_HOST=redis
    depends_on:
      - redis
    networks:
      - app_network

networks:
  app_network:
    driver: bridge